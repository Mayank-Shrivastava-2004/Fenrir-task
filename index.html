<!doctype html>
<html lang="en">

    <title>Fenrir Security – Cybersecurity Platform</title>
    <meta name="description" content="B2B SaaS Cybersecurity scanning and vulnerability management platform." />

    <!-- ⚡ No-flash: apply dark class BEFORE paint to avoid white flicker -->
    <script>
      try {
        var t = localStorage.getItem("fenrir-theme");
        if (t === "dark" || !t) document.documentElement.classList.add("dark");
      } catch(e){}
    </script>

    <!-- Google Fonts: Inter + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  </body>
